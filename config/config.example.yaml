telegram:
  api_id: 123456                 # TODO: 改成你的 Telegram api_id
  api_hash: "CHANGE_ME"          # TODO: 改成你的 Telegram api_hash
  session_path: "/session/telegram.session"

  # 监听来源（可配置多个）
  # - 每行一个来源；支持公开频道/群的 @username（推荐），也支持 t.me 链接或数值 ID。
  # - 账号必须已加入/可访问，否则启动时会在 "sources resolved" 阶段报错。
  # 示例：
  #   sources:
  #     - "@ChannelA"
  #     - "@ChannelB"
  #     - "https://t.me/SomePublicChannel"
  sources:
    - "@ChannelA"


qq:
  onebot_base_url: "http://127.0.0.1:3000"
  token: "CHANGE_ME"            # 你的 NapCat HTTP token
  request_timeout_seconds: 60
  # 每条转发消息的最小发送间隔（秒），用于降低突发发送风控风险
  send_interval_seconds: 10

  # 转发消息 到目标QQ群：填一个或多个群号。
  # 每条消息会尽量发到所有群，单群失败不影响其它群。
  group_ids: [963115963]
  # 或
  # group_ids: [963115963, 123456789]  # 多群

  # OneBot HTTP 调用重试（仅对超时/连接失败/429/5xx 自动重试）
  retry:
    enabled: true
    max_attempts: 3
    base_delay_ms: 500
    max_delay_ms: 5000
    jitter_ms: 200


storage:
  # tg2qq 容器内挂载路径（映射到宿主机 /home/tg2qqqun/data/tg_media）
  host_media_dir_in_container: "/host_tg_media"

  # NapCat 容器内可见路径（需要在 NapCat 容器中把宿主机 /home/tg2qqqun/data/tg_media 挂载到该路径）
  napcat_media_dir_in_container: "/AstrBot/data/tg_media"

# 媒体文件保留策略（防止图片目录无限增长）
media_retention:
  enabled: true
  # 仅清理该目录下的文件（tg2qq 容器内路径）
  dir_in_container: "/host_tg_media"
  # 保留天数：超过该天数的文件会被删除
  keep_days: 3
  # 每隔多少小时执行一次清理
  interval_hours: 24

# 去重：持久化到 /session（docker-compose 已挂载 ./session）
dedup:
  enabled: true
  db_path: "/session/dedup.sqlite3"
  # 可选：自动过期（秒）。0 表示不自动过期
  ttl_seconds: 0
  # 去重标记时机：
  # - success：至少一个目标群发送成功后才标记（推荐，避免发送失败导致漏发）
  # - receive：接收到消息即标记（旧行为）
  mark_on: "success"

rules:
  transforms:
    # 过滤器：黑名单优先；并开启白名单模式（只转发命中 allow 的内容）
    - type: "filter_text"
      # 黑名单：命中即丢弃（优先级最高）
      block_keywords: ["抽奖", "广告"]
      block_regex: ["(?i)telegram\\.me/", "(?i)t\\.me/"]
      # 白名单：只转发包含 4K 的内容
      allow_keywords: ["4K"]
      # require_allows=true 时，必须命中 allow_keywords/allow_regex 才会通过
      require_allows: true

    # (1) 将首行前缀“名称：”替换为“🎬 已更新：”
    - type: "regex_replace"
      pattern: "^名称[:：]\\s*"
      repl: "🎬 已更新："

    # (2) 删除：从“📤 资源链接”开始一直到结尾（覆盖私聊导流/投稿/频道群组/广告合作等）
    - type: "regex_replace"
      pattern: "(?s)📤\\s*资源链接[\\s\\S]*$"
      repl: ""

    # (3) 多空行收敛：3个以上换行 -> 2个换行
    - type: "regex_replace"
      pattern: "\\n{3,}"
      repl: "\n\n"

    # (4) 追加你自己的资源说明模板，并自动提取 {title}
    - type: "append_dynamic"
      template: |
        📤 资源链接：
        在本群发送“搜 {title}”
        或访问 www.zhuiju.us 搜更多资源

# 日志等级：INFO / DEBUG
logging:
  level: INFO
